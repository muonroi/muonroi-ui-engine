name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm build

      - name: type-check
        run: pnpm -r --if-present run type-check

      - name: lint
        run: pnpm -r --if-present run lint

      - name: test
        run: pnpm run --if-present test
