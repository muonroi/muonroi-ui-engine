name: Publish npm Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    name: Publish @muonroi packages to npmjs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        package_dir:
          - packages/m-ui-engine-core
          - packages/m-ui-engine-react
          - packages/m-ui-engine-angular
          - packages/m-ui-engine-primeng
          - packages/m-ui-engine-rule-components
          - packages/m-ui-engine-rule-components-primeng
          - packages/m-ui-engine-signalr
          - packages/m-ui-engine-sync
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test (if exists)
        run: pnpm run --if-present test

      - name: Publish package (skip existing)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(node -p "require('./${{ matrix.package_dir }}/package.json').name")
          PKG_VERSION=$(node -p "require('./${{ matrix.package_dir }}/package.json').version")

          if npm view "${PKG_NAME}@${PKG_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} is already published on npm. Skipping."
            # Enforce public visibility even when the version already exists.
            npm access set status=public "${PKG_NAME}" --registry=https://registry.npmjs.org
            exit 0
          fi

          pnpm --filter "${PKG_NAME}" publish --access public --no-git-checks --provenance
          npm access set status=public "${PKG_NAME}" --registry=https://registry.npmjs.org
